# ============================================================
# COP Engine — Nginx Reverse Proxy
# ============================================================
# Hanterar:
#   - HTTPS terminering (om SSL-cert finns)
#   - Rate limiting för API-skydd
#   - CORS headers
#   - Statisk filservering (dashboard)
#   - Proxy till FastAPI backend
# ============================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=solver_limit:10m rate=2r/s;

upstream cop_backend {
    server cop-api:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # === Security Headers ===
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # === Logging ===
    access_log /var/log/cop/nginx_access.log;
    error_log /var/log/cop/nginx_error.log;

    # === Static: Dashboard ===
    location /dashboard {
        alias /app/data/dashboard;
        index COP_Dashboard.html;
        try_files $uri $uri/ /COP_Dashboard.html;
    }

    # === API: Health (no rate limit) ===
    location = /health {
        proxy_pass http://cop_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # === API: Solver endpoints (strict rate limit) ===
    location ~ ^/schedule/(generate|reoptimize) {
        limit_req zone=solver_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://cop_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Solver kan ta lång tid
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # === API: All other endpoints ===
    location / {
        limit_req zone=api_limit burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://cop_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;

        # CORS
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # === Error pages ===
    error_page 429 /429.json;
    location = /429.json {
        default_type application/json;
        return 429 '{"error": "Rate limit exceeded", "message": "Vänta en stund och försök igen"}';
    }

    error_page 502 503 504 /50x.json;
    location = /50x.json {
        default_type application/json;
        return 503 '{"error": "Service unavailable", "message": "COP Engine startar om, försök igen om 30 sekunder"}';
    }
}

